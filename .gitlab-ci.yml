variables:
  USERNAME: "amozhaykin"
  APP_NAME: "my-app"
  POSTGRES_DB_NAME: "amozhaykin_my_app"

stages:
  - lint
  - test
  - build
  - migration
  - update-tag

lint:
  stage: lint
  script:
    - golangci-lint run -v

test:
  stage: test
  script:
    - go test -v ./...

build: # сборка image образа и его push в harbor
  stage: build
  variables:
    IMAGE: $REGISTRY/$USERNAME/$APP_NAME # переменную $REGISTRY мы не видим, она прописана в админке gitlab
    TAG: $CI_COMMIT_SHORT_SHA # устанавливаем тег, как short SHA последнего коммита
  script:
    - cat $ENV_FILE > .env
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASS" $REGISTRY # авторизация в harbor
    - docker build --tag $IMAGE:$TAG .
    - docker push $IMAGE:$TAG # назначаем тег прописанный выше image образу

migration:
  stage: migration
  variables:
    DB_URL: postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB_NAME
    MIGRATE_PATH: ./migration/postgres
  script:
    - migrate -database $DB_URL -path $MIGRATE_PATH up

update-tag: # этой секции может здесь не быть, в этом случае обновление тега выполняется вручную или нажатием кнопки
  stage: update-tag
  variables:
    IMAGE: $REGISTRY/$USERNAME/$APP_NAME
    TAG: $CI_COMMIT_SHORT_SHA # устанавливаем тег, как short SHA последнего коммита
    REPOSITORY: https://$GITLAB_DEPLOY_USER:$GITLAB_DEPLOY_PASS@gitlab.golang.ru/mozhaykin/deploy.git
    DEPLOYMENT: 1-deployment.yaml
  script:
    - git config --global user.email "ci@gitlab.bot" # прописываем глобального пользователя "ci@gitlab.bot"
    - git config --global user.name "CI Bot" # указываем имя "CI Bot", которое будет указываться при автоматическом push в репозиторий deploy
    - git clone $REPOSITORY # клонируем репозиторий deploy
    - cd deploy/k8s-manifests/$USERNAME-$APP_NAME # переходим в папку с манифестом deploy
    - sed -i "s|$IMAGE:.*|$IMAGE:$TAG|g" $DEPLOYMENT # через поиск и замену меняется тег версии нашего image на тег установленный выше
    - git add $DEPLOYMENT
    - git commit -m "$USERNAME - $APP_NAME update image $TAG"
    - git push $REPOSITORY
